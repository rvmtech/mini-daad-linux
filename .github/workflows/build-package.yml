name: Build Release Package

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version and set zip name
        run: |
          VERSION=$(grep -E '^APPVERSION=' scripts/functions.sh | cut -d'=' -f2 | tr -d '"' | tr -d "'")
          echo "Detected version: $VERSION"
          echo "ZIP_NAME=mini-daad-linux-${VERSION}.zip" >> $GITHUB_ENV

      - name: Create zip package
        run: |
          echo "Creating package: ${{ env.ZIP_NAME }}"
          git archive --format=zip --prefix="mini-daad-linux/" --output="${{ env.ZIP_NAME }}" HEAD

      - name: Upload artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}

      - name: Upload to release
        if: github.event_name == 'release'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./*.zip
          tag: ${{ github.ref }}
          overwrite: true
          file_glob: true
